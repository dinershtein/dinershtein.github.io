<!DOCTYPE html>
<html>
	<head>
		<title>Llama Search Redirect</title>
		<script>
			// Get the search query from URL parameters
			const urlParams = new URLSearchParams(window.location.search);
			const searchTerms = urlParams.get('q') || '';

			// Redirect to Llama
			window.location.href = `https://www.meta.ai/?q=${encodeURIComponent(searchTerms)}&hints=search&ref=ext`;
		</script>
	</head>
	<body>
		<p>Redirecting to Llama...</p>
	</body>
</html>
