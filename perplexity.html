<!DOCTYPE html>
<html>
	<head>
		<title>Perplexity Search Redirect</title>
		<script>
			// Get the search query from URL parameters
			const urlParams = new URLSearchParams(window.location.search);
			const searchTerms = urlParams.get('q') || '';

			// Redirect to Perplexity
			window.location.href = `https://perplexity.ai/search/?q=${encodeURIComponent(searchTerms)}&hints=search&ref=ext`;
		</script>
	</head>
	<body>
		<p>Redirecting to Perplexity...</p>
	</body>
</html>
