<!DOCTYPE html>
<html>
	<head>
		<title>Claude Search Redirect</title>
		<script>
			// Get the search query from URL parameters
			const urlParams = new URLSearchParams(window.location.search);
			const searchTerms = urlParams.get('q') || '';

			// Redirect to Claude
			window.location.href = `https://claude.ai/new?q=${encodeURIComponent(searchTerms)}&hints=search&ref=ext`;
		</script>
	</head>
	<body>
		<p>Redirecting to Claude...</p>
	</body>
</html>
