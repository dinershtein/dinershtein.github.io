<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Leonid Dinershtein</title>
    <meta name="description" content="Get in touch with Leonid Dinershtein.">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --text: #111;
            --dim: #555;
            --faint: #999;
            --rule: #e5e5e5;
            --link: #0055cc;
            --bg: #fff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .page {
            max-width: 640px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        a {
            color: var(--link);
            text-decoration: underline;
            text-decoration-color: rgba(0, 85, 204, 0.3);
            text-underline-offset: 2px;
            transition: text-decoration-color 0.2s;
        }
        a:hover {
            text-decoration-color: var(--link);
        }

        header {
            padding: 3.5rem 0 0;
        }
        .back {
            color: var(--dim);
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            transition: color 0.2s;
        }
        .back:hover { color: var(--link); }

        .form-wrap {
            padding: 2rem 0 2.5rem;
            margin-top: 2rem;
            border-top: 1px solid var(--rule);
        }
        iframe {
            width: 100%;
            height: 900px;
            border: 0;
            display: block;
        }

        footer {
            padding: 2rem 0 3rem;
            font-size: 0.78rem;
            color: var(--faint);
        }

        @media (max-width: 480px) {
            header { padding-top: 2.5rem; }
            iframe { height: 1100px; }
        }
    </style>
</head>
<body>

<div class="page">

    <header>
        <a class="back" href="/">← Leonid Dinershtein</a>
    </header>

    <div class="form-wrap">
        <iframe
            src="https://docs.google.com/forms/d/e/1FAIpQLSckbXb_jgaYUO1R3gHqruXwwy513G0BkjEJlNABdiS3MUDdAg/viewform?embedded=true"
            title="Contact form">
            Loading…
        </iframe>
    </div>

    <footer>
        &copy; 2026 Leonid Dinershtein
    </footer>

</div>

</body>
</html>
